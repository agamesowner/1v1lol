<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embedded Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #111; /* Dark background */
        }
        iframe {
            width: 100%;
            max-width: 960px; /* Adjust max width for your game */
            height: 540px; /* Adjust height */
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
        }
    </style>
</head>
<body>

    <!-- Replace the src URL with your actual game link -->
    <iframe src="https://googleusercontent.b-cdn.net/one/oneup.html" allowfullscreen></iframe>

</body>
</html>
